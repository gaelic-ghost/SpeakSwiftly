name: Swift

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build-and-test:
    name: Swift on macOS 15
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Install formatting and linting tools
        run: brew install swiftformat swiftlint

      - name: Run repo-maintenance validation
        run: sh scripts/repo-maintenance/validate-all.sh

      - name: Validate package manifest
        run: swift package dump-package

      - name: Build package
        run: swift build

      - name: Prepare vendored MLX metallib for SwiftPM tests
        shell: bash
        run: |
          set -euo pipefail

          resources_output="$(swift run SpeakSwiftlyTesting resources)"
          mlx_bundle_path="$(printf '%s\n' "$resources_output" | awk -F': ' '/^mlx_bundle: / { print $2 }')"
          default_metallib_path="$(printf '%s\n' "$resources_output" | awk -F': ' '/^default_metallib: / { print $2 }')"

          if [[ -z "$mlx_bundle_path" || -z "$default_metallib_path" ]]; then
            printf 'SpeakSwiftly CI could not resolve the vendored MLX resource paths needed for swift test.\n' >&2
            printf '%s\n' "$resources_output" >&2
            exit 1
          fi

          ln -sf Contents/Resources/default.metallib "$mlx_bundle_path/default.metallib"
          printf 'Prepared SwiftPM MLX metallib shim at %s/default.metallib -> %s\n' "$mlx_bundle_path" "$default_metallib_path"

      - name: Run test suite
        run: swift test

  tagged-runtime-publication:
    name: Tagged Runtime Publication (${{ matrix.configuration }})
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Publish runtime
        run: sh scripts/repo-maintenance/publish-runtime.sh --configuration "${{ matrix.configuration }}"

      - name: Verify runtime
        run: sh scripts/repo-maintenance/verify-runtime.sh --configuration "${{ matrix.configuration }}"

      - name: Upload published runtime artifacts
        uses: actions/upload-artifact@v6
        with:
          name: speakswiftly-runtime-${{ matrix.configuration }}
          path: |
            .local/xcode/${{ matrix.configuration }}
            .local/xcode/SpeakSwiftly.*.json
