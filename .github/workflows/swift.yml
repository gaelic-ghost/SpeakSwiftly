name: Swift

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build-and-test:
    name: Swift on macOS 15
    runs-on: macos-15
    env:
      SPEAKSWIFTLY_CI_DERIVED_DATA: .local/xcode/derived-data/ci
      SPEAKSWIFTLY_CI_SOURCE_PACKAGES: .local/xcode/source-packages

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Install formatting and linting tools
        run: brew install swiftformat swiftlint

      - name: Run repo-maintenance validation
        run: sh scripts/repo-maintenance/validate-all.sh

      - name: Validate package manifest
        run: swift package dump-package

      - name: Build package tests with Xcode-backed workspace
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild build-for-testing -quiet \
            -workspace .swiftpm/xcode/package.xcworkspace \
            -scheme SpeakSwiftly-Package \
            -destination 'platform=macOS' \
            -derivedDataPath "$SPEAKSWIFTLY_CI_DERIVED_DATA" \
            -clonedSourcePackagesDirPath "$SPEAKSWIFTLY_CI_SOURCE_PACKAGES"

      - name: Resolve Xcode-backed test manifest
        shell: bash
        run: |
          set -euo pipefail

          xctestrun_path="$(find "$SPEAKSWIFTLY_CI_DERIVED_DATA/Build/Products" -maxdepth 1 -name '*.xctestrun' | head -n 1)"
          if [[ -z "$xctestrun_path" ]]; then
            printf 'SpeakSwiftly CI could not find the .xctestrun manifest produced by build-for-testing under %s.\n' "$SPEAKSWIFTLY_CI_DERIVED_DATA/Build/Products" >&2
            exit 1
          fi

          printf 'SPEAKSWIFTLY_CI_XCTESTRUN=%s\n' "$xctestrun_path" >>"$GITHUB_ENV"

      - name: Run runtime and library package tests
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild test-without-building -quiet \
            -xctestrun "$SPEAKSWIFTLY_CI_XCTESTRUN" \
            -destination 'platform=macOS' \
            -only-testing:'SpeakSwiftlyTests/WorkerRuntimePlaybackTests' \
            -only-testing:'SpeakSwiftlyTests/LibrarySurfaceTests'

      - name: Run model client package tests
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild test-without-building -quiet \
            -xctestrun "$SPEAKSWIFTLY_CI_XCTESTRUN" \
            -destination 'platform=macOS' \
            -only-testing:'SpeakSwiftlyTests/ModelClientsTests'

  tagged-runtime-publication:
    name: Tagged Runtime Publication (${{ matrix.configuration }})
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Publish runtime
        run: sh scripts/repo-maintenance/publish-runtime.sh --configuration "${{ matrix.configuration }}"

      - name: Verify runtime
        run: sh scripts/repo-maintenance/verify-runtime.sh --configuration "${{ matrix.configuration }}"

      - name: Upload published runtime artifacts
        uses: actions/upload-artifact@v6
        with:
          name: speakswiftly-runtime-${{ matrix.configuration }}
          path: |
            .local/xcode/${{ matrix.configuration }}
            .local/xcode/SpeakSwiftly.*.json
